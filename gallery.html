<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Ultra Gallery</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    background:#111827;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:15px;
}

.gallery img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    background:#222;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.97);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup img{
    max-width:92%;
    max-height:80%;
    border-radius:12px;
    animation:zoom 0.3s ease;
}

@keyframes zoom{
    from{transform:scale(0.8);}
    to{transform:scale(1);}
}

.close,.prev,.next{
    position:absolute;
    font-size:30px;
    cursor:pointer;
    user-select:none;
}

.close{top:15px;right:20px;font-size:35px;}
.prev{left:15px;top:50%;}
.next{right:15px;top:50%;}
</style>
</head>

<body>

<header>VR Computer Ultra Gallery</header>

<div class="gallery" id="gallery"></div>

<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">×</span>
    <span class="prev" onclick="change(-1)">❮</span>
    <img id="popupImg">
    <span class="next" onclick="change(1)">❯</span>
</div>

<script>

let images = [
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/1.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/2.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/3.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/4.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/5.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/6.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/7.jpg"
];

let current = 0;

/* LOAD GALLERY */
function loadGallery(){
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = ""; // clear old

    images.forEach((src, i)=>{
        let img = document.createElement("img");

        // FORCE REFRESH (important for mobile)
        img.src = src + "?v=" + new Date().getTime();

        img.onerror = () => {
            img.style.border = "2px solid red";
            console.log("❌ Failed:", src);
        };

        img.onload = () => {
            console.log("✅ Loaded:", src);
        };

        img.onclick = () => openImg(i);
        gallery.appendChild(img);
    });
}

/* OPEN */
function openImg(i){
    current = i;
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src = images[current];
}

/* CLOSE */
function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* CHANGE */
function change(step){
    current += step;
    if(current >= images.length) current = 0;
    if(current < 0) current = images.length - 1;
    document.getElementById("popupImg").src = images[current];
}

/* INIT */
loadGallery();

</script>

</body>
</html>
