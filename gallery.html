<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Gallery</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:#111827;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:15px;
}

.gallery img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    loading:lazy;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.97);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup img{
    max-width:92%;
    max-height:80%;
    border-radius:12px;
    animation:zoom 0.25s ease;
}

@keyframes zoom{
    from{transform:scale(0.6);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* BUTTONS */
.close,.prev,.next,.download{
    position:absolute;
    color:white;
    font-size:28px;
    cursor:pointer;
    user-select:none;
}

.close{top:15px;right:20px;font-size:35px;}
.prev{left:15px;top:50%;}
.next{right:15px;top:50%;}
.download{bottom:20px;right:20px;font-size:20px;background:#1abc9c;padding:8px 12px;border-radius:8px;}

</style>
</head>

<body>

<header>VR Computer Ultra Gallery</header>

<!-- GALLERY -->
<div class="gallery">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/1.jpg" onclick="openImg(0)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/2.jpg" onclick="openImg(1)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/3.jpg" onclick="openImg(2)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/4.jpg" onclick="openImg(3)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/5.jpg" onclick="openImg(4)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/6.jpg" onclick="openImg(5)">
    <img src="https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/7.jpg" onclick="openImg(6)">
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">×</span>
    <span class="prev" onclick="change(-1)">❮</span>
    <img id="popupImg">
    <span class="next" onclick="change(1)">❯</span>
    <div class="download" onclick="downloadImg()">⬇ Download</div>
</div>

<script>

let images=[
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/1.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/2.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/3.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/4.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/5.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/6.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/7.jpg"
];

let current=0;
let zoom=false;

/* OPEN */
function openImg(i){
    current=i;
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=images[current];
}

/* CLOSE */
function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* CHANGE */
function change(step){
    current+=step;
    if(current>=images.length) current=0;
    if(current<0) current=images.length-1;
    document.getElementById("popupImg").src=images[current];
}

/* AUTO SLIDER WHEN OPEN */
setInterval(()=>{
    if(document.getElementById("popup").style.display==="flex"){
        change(1);
    }
},3000);

/* DOWNLOAD IMAGE */
function downloadImg(){
    let a=document.createElement("a");
    a.href=images[current];
    a.download="vr-computer.jpg";
    a.click();
}

/* SWIPE SUPPORT */
let startX=0;

document.getElementById("popup").addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
});

document.getElementById("popup").addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50) change(1);
    if(endX-startX>50) change(-1);
});

/* DOUBLE TAP ZOOM */
document.getElementById("popupImg").addEventListener("click",()=>{
    zoom=!zoom;
    document.getElementById("popupImg").style.transform=
        zoom ? "scale(1.5)" : "scale(1)";
});
</script>

</body>
</html>
