<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Debug - VR Computer</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:15px;
}

.gallery img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    background:#222;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* LOADING TEXT */
.loading{
    position:fixed;
    top:10px;
    left:10px;
    background:#1abc9c;
    padding:6px 10px;
    border-radius:6px;
    font-size:14px;
    display:none;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:20px;
    font-size:35px;
    cursor:pointer;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    cursor:pointer;
    padding:10px;
}

.prev{left:10px;}
.next{right:10px;}
</style>
</head>

<body>

<h2>Gallery Debug Mode</h2>

<div class="loading" id="loading">Loading image...</div>

<!-- GALLERY -->
<div class="gallery">
    <img id="img1" onclick="openImg(1)">
    <img id="img2" onclick="openImg(2)">
    <img id="img3" onclick="openImg(3)">
    <img id="img4" onclick="openImg(4)">
    <img id="img5" onclick="openImg(5)">
    <img id="img6" onclick="openImg(6)">
    <img id="img7" onclick="openImg(7)">
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">&times;</span>
    <img id="popupImg">
    <div class="prev" onclick="change(-1)">&#10094;</div>
    <div class="next" onclick="change(1)">&#10095;</div>
</div>

<script>

/* ✅ RAW GITHUB IMAGE LINKS (FIX FOR MOBILE) */
let images = [
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/1.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/2.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/3.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/4.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/5.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/6.jpg",
"https://raw.githubusercontent.com/anantchandangole/VR-COMPUTER/main/7.jpg"
];

let current=0;

/* LOAD IMAGES WITH DEBUG */
function loadImages(){
    for(let i=0;i<images.length;i++){
        let img=document.getElementById("img"+i);
        img.src=images[i];

        img.onerror=function(){
            img.style.border="2px solid red";
            img.alt="FAILED TO LOAD";
        }
    }
}

/* OPEN POPUP */
function openImg(i){
    current=i;
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=images[current];
}

/* CLOSE */
function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* NEXT/PREV */
function change(step){
    current+=step;
    if(current>=images.length) current=0;
    if(current<0) current=images.length-1;
    document.getElementById("popupImg").src=images[current];
}

/* AUTO SLIDER */
setInterval(()=>{
    if(document.getElementById("popup").style.display==="flex"){
        change(1);
    }
},3000);

/* INIT */
loadImages();

</script>

</body>
</html>
