<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - VR Computer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* GRID GALLERY (Instagram Style) */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    padding:15px;
}

.gallery img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
    animation:zoom 0.3s;
}

@keyframes zoom{
    from{transform:scale(0.6);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.close{
    position:absolute;
    top:20px;
    right:25px;
    font-size:35px;
    cursor:pointer;
    color:white;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    cursor:pointer;
    padding:10px;
    color:white;
}

.prev{left:20px;}
.next{right:20px;}

</style>
</head>

<body>

<header>
    VR Computer Services Gallery
</header>

<!-- GALLERY GRID -->
<div class="gallery">
    <img src="1.jpg" onclick="openImg(0)">
    <img src="2.jpg" onclick="openImg(1)">
    <img src="3.jpg" onclick="openImg(2)">
    <img src="4.jpg" onclick="openImg(3)">
    <img src="5.jpg" onclick="openImg(4)">
    <img src="6.jpg" onclick="openImg(5)">
    <img src="7.jpg" onclick="openImg(6)">
</div>

<!-- POPUP VIEWER -->
<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">&times;</span>
    <img id="popupImg">
    <div class="prev" onclick="change(-1)">&#10094;</div>
    <div class="next" onclick="change(1)">&#10095;</div>
</div>

<script>
let images=["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg"];
let index=0;

function openImg(i){
    index=i;
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=images[index];
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function change(step){
    index+=step;
    if(index>=images.length) index=0;
    if(index<0) index=images.length-1;
    document.getElementById("popupImg").src=images[index];
}

/* AUTO SLIDER */
setInterval(()=>{
    if(document.getElementById("popup").style.display==="flex"){
        change(1);
    }
},3000);

/* SWIPE MOBILE */
let startX=0;

document.getElementById("popup").addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
});

document.getElementById("popup").addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50) change(1);
    if(endX-startX>50) change(-1);
});
</script>

</body>
</html>
