<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f7fb;
    color: #333;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #00c6ff, #00ff99);
    color: white;
    padding: 25px 15px;
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* IMAGE */
.image-box {
    text-align: center;
    margin-top: 20px;
}

.image-box img {
    width: 100%;
    max-width: 320px;
    border-radius: 12px;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    margin-top: 30px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* SERVICES */
.service {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 15px 0;
    font-size: 18px;
}

.service i {
    background: #e8fdf8;
    color: #1abc9c;
    padding: 10px;
    border-radius: 50%;
    font-size: 18px;
    transition: 0.3s;
}

.service:hover i {
    background: #1abc9c;
    color: white;
}

/* BUTTON */
.back-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 12px 28px;
    background: linear-gradient(90deg, #1abc9c, #00c6ff);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 500;
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #666;
}
