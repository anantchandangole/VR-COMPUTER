<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - VR Computer Services</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#0d6efd,#1abc9c);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0b5ed7;
}

.role-switch{
    margin-bottom:15px;
}

.role-switch button{
    width:48%;
    background:#eee;
    color:black;
}

.role-switch button.active{
    background:#1abc9c;
    color:white;
}

.small{
    font-size:12px;
    color:#666;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <!-- ROLE SWITCH -->
    <div class="role-switch">
        <button id="adminBtn" class="active" onclick="setRole('admin')">Admin</button>
        <button id="engBtn" onclick="setRole('engineer')">Engineer</button>
    </div>

    <!-- FORM -->
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="small">
        Admin: administrator / desk@123<br>
        Engineer: vrcs01 - vrcs200
    </div>

</div>

<script>

let role = "admin";

function setRole(selected){
    role = selected;

    document.getElementById("adminBtn").classList.remove("active");
    document.getElementById("engBtn").classList.remove("active");

    if(selected === "admin"){
        document.getElementById("adminBtn").classList.add("active");
    }else{
        document.getElementById("engBtn").classList.add("active");
    }
}

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(role === "admin"){
        if(user === "administrator" && pass === "desk@123"){
            alert("Admin Login Success");
            window.location.href = "admin.html";
        }else{
            alert("Invalid Admin Login");
        }
    }

    if(role === "engineer"){
        if(user.startsWith("vrcs") && pass.length > 0){
            alert("Engineer Login Success");
            window.location.href = "engineer.html";
        }else{
            alert("Invalid Engineer Login");
        }
    }
}

</script>

</body>
</html>
